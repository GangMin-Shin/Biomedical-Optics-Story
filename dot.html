<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Diffuse Optical Tomography (DOT)</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: cursive;
      color: white;
      background-color: #000000;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url("images/background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.5;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(
        rgba(0, 0, 0, 0.35),
        rgba(0, 0, 0, 0.75)
      );
      z-index: -1;
    }

    .page {
      padding: 50px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 44px;
      color: #66ccff;
      text-shadow:
        0 0 8px #66ccff,
        0 0 18px rgba(102, 204, 255, 0.6);
    }

    p {
      max-width: 850px;
      font-size: 20px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.9);
    }

    a {
      display: inline-block;
      margin-top: 30px;
      font-size: 20px;
      color: white;
      text-decoration: none;
      transition: 0.25s ease;
    }

    a:hover {
      color: #66ccff;
      font-weight: bold;
      text-shadow:
        0 0 6px #66ccff,
        0 0 14px #66ccff;
      transform: translateX(-5px);
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>Diffuse Optical Tomography (DOT)</h1>

    <p>
      This page will contain learning materials and interactive simulations
      for diffuse optical tomography, including photon diffusion, source-detector
      sensitivity, the Born measurement equation, and image reconstruction.
    </p>

    <a href="index.html">← Back to Home</a>
  </div>
</body>
</html>
