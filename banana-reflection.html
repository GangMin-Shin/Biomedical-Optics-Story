<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflection Geometry - Banana-shaped Sensitivity Kernel</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: white;
      background: #000 url("images/Geometry background.png") center / cover fixed no-repeat;
      overflow-x: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(70, 180, 255, 0.18), transparent 32%),
        linear-gradient(rgba(0, 0, 0, 0.36), rgba(0, 0, 0, 0.78));
      z-index: 0;
      pointer-events: none;
    }

    .page-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 34px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 24px;
      max-width: 1450px;
      margin: 0 auto;
    }

    .viewer-card,
    .option-card,
    .result-card,
    .layer-card,
    .optical-card {
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow:
        0 0 18px rgba(255, 255, 255, 0.12),
        0 0 36px rgba(110, 210, 255, 0.18);
      backdrop-filter: blur(5px);
    }

    .viewer-card {
      padding: 28px;
    }

    .option-card {
      position: sticky;
      top: 28px;
      padding: 24px;
    }

    .result-card,
    .layer-card {
      margin-top: 18px;
      padding: 18px;
    }

    .optical-card {
      max-width: 980px;
      margin: 18px auto 0;
      padding: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 38px;
      color: rgba(255, 255, 255, 0.98);
      text-shadow:
        0 0 8px rgba(102, 204, 255, 0.55),
        0 0 18px rgba(102, 204, 255, 0.35);
    }

    .subtitle {
      margin: 0 0 20px;
      font-size: 15px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.86);
      max-width: 980px;
    }

    .model-info {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .info-box {
      padding: 13px 15px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      line-height: 1.55;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.84);
    }

    .info-box strong {
      display: block;
      margin-bottom: 5px;
      color: rgba(170, 230, 255, 0.98);
      font-size: 14px;
    }

    .canvas-wrap {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      max-width: 980px;
      margin: 18px auto 0;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.86);
    }

    .colorbar {
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, #30123b, #4145ab, #2c7ef7, #1bcfd4, #61fc6c, #d1e834, #f99c24, #d7191c);
      border: 1px solid rgba(255, 255, 255, 0.42);
    }

    .option-card h2,
    .result-card h2,
    .layer-card h2,
    .optical-card h2 {
      margin: 0 0 18px;
      font-size: 25px;
      color: rgba(170, 230, 255, 0.98);
      text-shadow: 0 0 8px rgba(102, 204, 255, 0.36);
    }

    .control-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.92);
    }

    select,
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.11);
      color: white;
      font-family: Arial, "Noto Sans KR", sans-serif;
      font-size: 15px;
      outline: none;
    }

    option {
      color: black;
    }

    .input-hint {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.65);
    }

    .run-button {
      width: 100%;
      margin-top: 8px;
      padding: 12px 14px;
      border: none;
      border-radius: 999px;
      background: rgba(102, 204, 255, 0.22);
      color: white;
      font-family: Arial, "Noto Sans KR", sans-serif;
      font-size: 17px;
      cursor: pointer;
      border: 1px solid rgba(102, 204, 255, 0.55);
      transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
    }

    .run-button:hover {
      background: rgba(102, 204, 255, 0.34);
      transform: translateY(-2px);
      box-shadow:
        0 0 10px rgba(102, 204, 255, 0.58),
        0 0 24px rgba(102, 204, 255, 0.32);
    }

    .run-button:disabled {
      opacity: 0.55;
      cursor: wait;
      transform: none;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.13);
      font-size: 13px;
      line-height: 1.5;
    }

    .metric span:first-child {
      color: rgba(255, 255, 255, 0.78);
    }

    .metric span:last-child {
      color: #fff27a;
      text-align: right;
    }

    .layer-list {
      display: grid;
      gap: 10px;
    }

    .layer-item {
      padding: 11px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .layer-title {
      margin-bottom: 5px;
      font-size: 13px;
      color: rgba(255, 242, 122, 0.98);
    }

    .layer-desc {
      margin: 0;
      font-size: 12px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.76);
    }

    .optical-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      font-size: 13px;
    }

    .optical-table th,
    .optical-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.13);
      text-align: left;
      line-height: 1.45;
    }

    .optical-table th {
      color: rgba(170, 230, 255, 0.98);
      background: rgba(255, 255, 255, 0.08);
      font-weight: 700;
    }

    .optical-table td {
      color: rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.04);
    }

    .optical-table td:nth-child(2),
    .optical-table td:nth-child(3) {
      color: #fff27a;
      white-space: nowrap;
    }

    .back-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .back-link {
      display: inline-block;
      padding: 9px 14px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.55);
      transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateX(-3px);
      box-shadow: 0 0 18px rgba(102, 204, 255, 0.35);
    }

    .status {
      margin-top: 12px;
      min-height: 18px;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(170, 230, 255, 0.94);
    }

    @media screen and (max-width: 1050px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .option-card {
        position: static;
      }

      .model-info {
        grid-template-columns: 1fr;
      }
    }

    @media screen and (max-width: 680px) {
      .page-container {
        padding: 22px;
      }

      .viewer-card,
      .option-card,
      .result-card,
      .layer-card,
      .optical-card {
        padding: 20px;
      }

      h1 {
        font-size: 30px;
      }

      .legend {
        grid-template-columns: 1fr;
      }

      .optical-table {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="page-container">
    <div class="layout">

        <h1>Reflection Geometry</h1>

          <canvas id="kernelCanvas" width="980" height="660"></canvas>
        </div>

        </div>

        <section class="optical-card">

          <div id="opticalPanel"></div>

      </main>

      <aside>

            <input id="sdsInput" type="number" min="2" max="60" step="0.5" value="20">

              Source-Detector Separation (SDS)

            <label for="photonInput">Photon number</label>

            <div class="input-hint">
              정확도를 높이려면 photon 수를 크게 설정하세요. 실행 시간은 증가합니다.
            </div>
          </div>

          <button class="run-button" id="runButton" type="button">Run Simulation</button>
          <div class="status" id="statusText"></div>

          <div class="back-links">
            <a class="back-link" href="dot.html">← Back to DOT</a>
            <a class="back-link" href="index.html">Homepage</a>
          </div>
        </section>

        <section class="result-card">
          <h2>Results</h2>

        </section>

        <section class="layer-card">
          <h2>Layer Settings</h2>
          <div id="layerPanel" class="layer-list"></div>
        </section>
      </aside>
    </div>
  </div>

          },

          },

          },
          {
            name: "Carpal bone / joint region",
            top: 11.0,
            bottom: 24.0,
            mua: 0.012,
            musp: 1.35,
            g: 0.90,
            n: 1.55,
            description: "손목뼈와 관절 구조가 지배적인 깊은 층입니다."
          },
          {
            name: "Extensor tendon region",
            top: 24.0,
            bottom: 29.0,
            mua: 0.018,
            musp: 1.05,
            g: 0.90,
            n: 1.43,
            description: "손등쪽 신전건 영역입니다."
          },
          {
            name: "Dorsal subcutaneous fat",
            top: 29.0,
            bottom: 33.8,
            mua: 0.010,
            musp: 0.65,
            g: 0.90,
            n: 1.44,
            description: "손등쪽 피하지방층입니다."
          },
          {
            name: "Dorsal skin",
            top: 33.8,
            bottom: 35.0,
            mua: 0.020,
            musp: 1.00,
            g: 0.90,
            n: 1.40,
            description: "손등쪽 피부층입니다."
          }
        ],
        roi: {
          name: "RA",
          fullName: "Radial artery",
          x: 0.0,
          z: 3.8,
          radius: 1.2
        }
      }
    };

    let currentWorker = null;

    function prepareModelForWorker(model) {
      return {
        title: model.title,
        wavelength: model.wavelength,
        xMinBase: model.xMinBase,
        xMaxBase: model.xMaxBase,
        zMin: model.zMin,
        zMax: model.zMax,
        rMax: model.rMax,
        dr: model.dr,
        dz: model.dz,
        sourceRadius: model.sourceRadius,
        targetName: model.targetName,
        targetRange: model.targetRange || null,
        layers: model.layers.map(layer => ({
          name: layer.name,
          top: layer.top,
          bottom: layer.bottom,
          mua: layer.mua,
          musp: layer.musp,
          g: layer.g,
          n: layer.n
        })),
        roi: model.roi ? { ...model.roi } : null
      };
    }

    function getPlotRange(model, sds) {
      const halfRange = Math.max(Math.abs(model.xMinBase), Math.abs(model.xMaxBase), sds * 0.85 + 15);

      return {
        xMin: -halfRange,
        xMax: halfRange,
        zMin: model.zMin,
        zMax: model.zMax
      };
    }

    function getLayer(model, z) {
      for (const layer of model.layers) {
        if (z >= layer.top && z < layer.bottom) {
          return layer;
        }
      }

      return model.layers[model.layers.length - 1];
    }

    function turboColor(v) {
      v = Math.max(0, Math.min(1, v));

      const r = 34.61 + v * (1172.33 + v * (-10793.56 + v * (33300.12 + v * (-38394.49 + v * 14825.05))));
      const g = 23.31 + v * (557.33 + v * (1225.33 + v * (-3574.96 + v * (1073.77 + v * 707.56))));
      const b = 27.20 + v * (3211.10 + v * (-15327.97 + v * (27814.00 + v * (-22569.18 + v * 6838.66))));

      return [
        Math.max(0, Math.min(255, Math.round(r))),
        Math.max(0, Math.min(255, Math.round(g))),
        Math.max(0, Math.min(255, Math.round(b)))
      ];
    }

    function buildImageData(values, maxVal, nx, nz, range) {
      const image = ctx.createImageData(nx, nz);

      for (let j = 0; j < nz; j++) {
        const z = range.zMin + (j / (nz - 1)) * (range.zMax - range.zMin);

        for (let i = 0; i < nx; i++) {
          const idx = j * nx + i;
          const p = idx * 4;

          if (z < 0) {
            image.data[p] = 255;
            image.data[p + 1] = 255;
            image.data[p + 2] = 255;
            image.data[p + 3] = 0;
            continue;
          }

          const normalized = values[idx] / (maxVal + 1e-30);
          const displayV = Math.min(1, normalized / 0.35);
          const [r, g, b] = turboColor(displayV);

          image.data[p] = r;
          image.data[p + 1] = g;
          image.data[p + 2] = b;
          image.data[p + 3] = 255;
        }
      }

      return image;
    }

    function calculateMetrics(model, values, maxVal, nx, nz, range) {
      let total = 0;
      let target = 0;

      const layerSums = new Map();

      for (const layer of model.layers) {
        layerSums.set(layer.name, 0);
      }

      const dx = (range.xMax - range.xMin) / (nx - 1);
      const dz = (range.zMax - range.zMin) / (nz - 1);

      for (let j = 0; j < nz; j++) {
        const z = range.zMin + (j / (nz - 1)) * (range.zMax - range.zMin);

        if (z < 0) {
          continue;
        }

        for (let i = 0; i < nx; i++) {
          const x = range.xMin + (i / (nx - 1)) * (range.xMax - range.xMin);
          const idx = j * nx + i;
          const v = values[idx] / (maxVal + 1e-30);
          const weightedV = v * dx * dz;

          total += weightedV;

          const layer = getLayer(model, z);
          layerSums.set(layer.name, layerSums.get(layer.name) + weightedV);

          if (model.roi) {
            const roi = model.roi;

            if ((x - roi.x) ** 2 + (z - roi.z) ** 2 <= roi.radius ** 2) {
              target += weightedV;
            }
          } else if (model.targetRange && z >= model.targetRange[0] && z < model.targetRange[1]) {
            target += weightedV;
          }
        }
      }

      return {
        total,
        target,
        targetPct: 100 * target / (total + 1e-30),
        layerSums
      };
    }

    function drawAxes(ctx, range, marginLeft, marginTop, plotW, plotH, width, height) {
      function xToPx(x) {
        return marginLeft + ((x - range.xMin) / (range.xMax - range.xMin)) * plotW;
      }

      function zToPx(z) {
        return marginTop + ((z - range.zMin) / (range.zMax - range.zMin)) * plotH;
      }

      ctx.strokeStyle = "rgba(0, 0, 0, 0.85)";
      ctx.lineWidth = 1.2;
      ctx.setLineDash([]);

      ctx.beginPath();
      ctx.moveTo(marginLeft, marginTop);
      ctx.lineTo(marginLeft, marginTop + plotH);
      ctx.lineTo(marginLeft + plotW, marginTop + plotH);
      ctx.lineTo(marginLeft + plotW, marginTop);
      ctx.stroke();

      ctx.fillStyle = "black";
      ctx.font = "13px Arial, sans-serif";
      ctx.textAlign = "center";

      const xTickStep = 10;
      const xStart = Math.ceil(range.xMin / xTickStep) * xTickStep;

      for (let x = xStart; x <= range.xMax; x += xTickStep) {
        const px = xToPx(x);

        ctx.strokeStyle = "rgba(0, 0, 0, 0.72)";
        ctx.beginPath();
        ctx.moveTo(px, marginTop + plotH);
        ctx.lineTo(px, marginTop + plotH + 6);
        ctx.stroke();

        ctx.fillText(String(x), px, marginTop + plotH + 22);
      }

      ctx.textAlign = "right";

      for (let z = 0; z <= range.zMax; z += 5) {
        const py = zToPx(z);

        ctx.strokeStyle = "rgba(0, 0, 0, 0.72)";
        ctx.beginPath();
        ctx.moveTo(marginLeft - 6, py);
        ctx.lineTo(marginLeft, py);
        ctx.stroke();

        ctx.fillText(String(z), marginLeft - 10, py + 4);
      }

      ctx.textAlign = "center";
      ctx.font = "16px Arial, sans-serif";
      ctx.fillText("Lateral position x (mm)", marginLeft + plotW / 2, height - 20);

      ctx.save();
      ctx.translate(25, marginTop + plotH / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText("Depth z (mm)", 0, 0);
      ctx.restore();

      return { xToPx, zToPx };
    }

    function drawLayers(ctx, model, marginLeft, plotW, xToPx, zToPx) {
      for (const layer of model.layers) {
        const yTop = zToPx(layer.top);

        ctx.strokeStyle = "rgba(255, 255, 255, 0.75)";
        ctx.lineWidth = 1.0;
        ctx.setLineDash([5, 4]);
        ctx.beginPath();
        ctx.moveTo(marginLeft, yTop);
        ctx.lineTo(marginLeft + plotW, yTop);
        ctx.stroke();
        ctx.setLineDash([]);

        const yMid = zToPx(0.5 * (layer.top + layer.bottom));

        ctx.fillStyle = "rgba(0, 0, 0, 0.42)";
        ctx.fillRect(marginLeft + 8, yMid - 10, ctx.measureText(layer.name).width + 12, 18);

        ctx.fillStyle = "white";
        ctx.font = "13px Arial, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(layer.name, marginLeft + 14, yMid + 4);
      }
    }

    function drawSourceDetector(ctx, sds, xToPx, zToPx) {
      const xs = -sds / 2;
      const xd = sds / 2;

      ctx.fillStyle = "black";
      ctx.fillRect(xToPx(xs) - 3, zToPx(-3), 6, zToPx(0) - zToPx(-3));
      ctx.fillRect(xToPx(xd) - 3, zToPx(-3), 6, zToPx(0) - zToPx(-3));

      ctx.fillStyle = "black";
      ctx.font = "bold 15px Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("S", xToPx(xs), zToPx(-3.35));
      ctx.fillText("D", xToPx(xd), zToPx(-3.35));
    }

    function drawRoi(ctx, model, range, xToPx, zToPx) {
      if (!model.roi) {
        return;
      }

      const roi = model.roi;
      const radiusPx = roi.radius / (range.xMax - range.xMin) * (xToPx(range.xMax) - xToPx(range.xMin));

      ctx.strokeStyle = "cyan";
      ctx.lineWidth = 2.0;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.arc(xToPx(roi.x), zToPx(roi.z), radiusPx, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "cyan";
      ctx.font = "bold 14px Arial, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(roi.name, xToPx(roi.x + roi.radius + 0.5), zToPx(roi.z) + 4);
    }

    function renderCanvas(model, sds, photons, values, maxVal, nx, nz, range) {
      const width = canvas.width;
      const height = canvas.height;

      const marginLeft = 72;
      const marginRight = 28;
      const marginTop = 32;
      const marginBottom = 68;

      const plotW = width - marginLeft - marginRight;
      const plotH = height - marginTop - marginBottom;

      const image = buildImageData(values, maxVal, nx, nz, range);

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "rgba(255, 255, 255, 0.96)";
      ctx.fillRect(0, 0, width, height);

      const offscreen = document.createElement("canvas");
      offscreen.width = nx;
      offscreen.height = nz;
      offscreen.getContext("2d").putImageData(image, 0, 0);

      ctx.drawImage(offscreen, marginLeft, marginTop, plotW, plotH);

      const axes = drawAxes(ctx, range, marginLeft, marginTop, plotW, plotH, width, height);

      drawLayers(ctx, model, marginLeft, plotW, axes.xToPx, axes.zToPx);
      drawSourceDetector(ctx, sds, axes.xToPx, axes.zToPx);
      drawRoi(ctx, model, range, axes.xToPx, axes.zToPx);

      const metrics = calculateMetrics(model, values, maxVal, nx, nz, range);
      updateResultPanel(model, sds, photons, metrics);
    }

    function updateResultPanel(model, sds, photons, metrics) {
      let html = "";

      html += `<div class="metric"><span>Model</span><span>${model.title}</span></div>`;
      html += `<div class="metric"><span>Wavelength</span><span>${model.wavelength} nm</span></div>`;
      html += `<div class="metric"><span>SDS</span><span>${sds.toFixed(1)} mm</span></div>`;
      html += `<div class="metric"><span>Photon number</span><span>${photons.toLocaleString()}</span></div>`;
      html += `<div class="metric"><span>Expected depth scale</span><span>${(sds / 2).toFixed(1)} mm</span></div>`;
      html += `<div class="metric"><span>${model.targetName}</span><span>${metrics.targetPct.toFixed(4)} %</span></div>`;

      for (const layer of model.layers) {
        const pct = 100 * metrics.layerSums.get(layer.name) / (metrics.total + 1e-30);
        html += `<div class="metric"><span>${layer.name}</span><span>${pct.toFixed(2)} %</span></div>`;
      }

      resultPanel.innerHTML = html;
    }

    function updateLayerPanel() {
      const model = models[modelSelect.value];
      let html = "";

      for (const layer of model.layers) {
        html += `
          <div class="layer-item">
            <div class="layer-title">${layer.name}</div>
            <p class="layer-desc">${layer.description}</p>
          </div>
        `;
      }

      layerPanel.innerHTML = html;
    }

    function updateOpticalPanel() {
      const model = models[modelSelect.value];

      let html = `
        <table class="optical-table">
          <thead>
            <tr>
              <th>Layer</th>
              <th>μa (mm⁻¹)</th>
              <th>μs′ (mm⁻¹)</th>
            </tr>
          </thead>
          <tbody>
      `;

      for (const layer of model.layers) {
        html += `
          <tr>
            <td>${layer.name}</td>
            <td>${layer.mua.toFixed(3)}</td>
            <td>${layer.musp.toFixed(3)}</td>
          </tr>
        `;
      }

      html += `
          </tbody>
        </table>
      `;

      opticalPanel.innerHTML = html;
    }

    function updateModelInfo() {
      const model = models[modelSelect.value];

      const targetText = model.roi
        ? `${model.roi.fullName}: x = ${model.roi.x.toFixed(1)} mm, z = ${model.roi.z.toFixed(1)} mm, radius = ${model.roi.radius.toFixed(1)} mm`
        : `${model.targetName}: z = ${model.targetRange[0].toFixed(1)}–${model.targetRange[1].toFixed(1)} mm`;

      modelInfo.innerHTML = `
        <div class="info-box">
          <strong>${model.title}</strong>
          ${model.geometryDescription}
        </div>
        <div class="info-box">
          <strong>Target region</strong>
          ${targetText}
        </div>
      `;
    }

    function setBusy(isBusy, text = "") {
      runButton.disabled = isBusy;
      statusText.textContent = text;
    }

    function createMonteCarloWorker() {
      const workerCode = `
        function createSeededRandom(seed) {
          let state = seed >>> 0;

          return function() {
            state = (1664525 * state + 1013904223) >>> 0;
            return (state + 1) / 4294967297;
          };
        }

        function findLayer(z, zTop, zBot) {
          for (let i = 0; i < zTop.length; i++) {
            if (z >= zTop[i] && z < zBot[i]) {
              return i;
            }
          }

          if (z >= zBot[zBot.length - 1]) {
            return zBot.length - 1;
          }

          return -1;
        }

        function spinHenyeyGreenstein(ux, uy, uz, g, rand) {
          const rnd = rand();
          let cosTheta;

          if (Math.abs(g) < 1e-12) {
            cosTheta = 2.0 * rnd - 1.0;
          } else {
            const temp = (1.0 - g * g) / (1.0 - g + 2.0 * g * rnd);
            cosTheta = (1.0 + g * g - temp * temp) / (2.0 * g);
          }

          cosTheta = Math.max(-1.0, Math.min(1.0, cosTheta));

          const sinTheta = Math.sqrt(Math.max(0.0, 1.0 - cosTheta * cosTheta));
          const psi = 2.0 * Math.PI * rand();
          const cosPsi = Math.cos(psi);
          const sinPsi = Math.sin(psi);

          let uxNew;
          let uyNew;
          let uzNew;

          if (Math.abs(uz) > 0.99999) {
            uxNew = sinTheta * cosPsi;
            uyNew = sinTheta * sinPsi;
            uzNew = Math.sign(uz || 1) * cosTheta;
          } else {
            const denom = Math.sqrt(1.0 - uz * uz);

            uxNew = sinTheta * (ux * uz * cosPsi - uy * sinPsi) / denom + ux * cosTheta;
            uyNew = sinTheta * (uy * uz * cosPsi + ux * sinPsi) / denom + uy * cosTheta;
            uzNew = -sinTheta * cosPsi * denom + uz * cosTheta;
          }

          const norm = Math.sqrt(uxNew * uxNew + uyNew * uyNew + uzNew * uzNew) + 1e-30;

          return [
            uxNew / norm,
            uyNew / norm,
            uzNew / norm
          ];
        }

        function monteCarloRZFluence(params) {
          const {
            nPhotons,
            nr,
            nz,
            dr,
            dz,
            zMax,
            sourceRadius,
            zTop,
            zBot,
            muA,
            muT,
            g,
            wThreshold,
            rouletteChance,
            maxSteps,
            seed
          } = params;

          const rand = createSeededRandom(seed);
          const fluence = new Float64Array(nz * nr);

          for (let p = 0; p < nPhotons; p++) {
            const rr = sourceRadius * Math.sqrt(rand());
            const phi0 = 2.0 * Math.PI * rand();

            let x = rr * Math.cos(phi0);
            let y = rr * Math.sin(phi0);
            let z = 1e-6;

            let ux = 0.0;
            let uy = 0.0;
            let uz = 1.0;

            let weight = 1.0;

            for (let stepIdx = 0; stepIdx < maxSteps; stepIdx++) {
              const layer = findLayer(z, zTop, zBot);

              if (layer < 0) {
                break;
              }

              const mua = muA[layer];
              const mut = muT[layer];
              const gg = g[layer];

              const s = -Math.log(Math.max(rand(), 1e-12)) / mut;

              const xNew = x + s * ux;
              const yNew = y + s * uy;
              const zNew = z + s * uz;

              if (zNew < 0.0) {
                if (uz < 0.0) {
                  const sToBoundary = -z / uz;
                  const xMid = x + 0.5 * sToBoundary * ux;
                  const yMid = y + 0.5 * sToBoundary * uy;
                  const zMid = z + 0.5 * sToBoundary * uz;

                  if (zMid >= 0.0 && zMid < zMax) {
                    const rMid = Math.sqrt(xMid * xMid + yMid * yMid);
                    const ir = Math.floor(rMid / dr);
                    const iz = Math.floor(zMid / dz);

                    if (ir >= 0 && ir < nr && iz >= 0 && iz < nz) {
                      fluence[iz * nr + ir] += weight * sToBoundary;
                    }
                  }
                }

                break;
              }

              if (zNew >= zMax) {
                break;
              }

              const xMid = 0.5 * (x + xNew);
              const yMid = 0.5 * (y + yNew);
              const zMid = 0.5 * (z + zNew);
              const rMid = Math.sqrt(xMid * xMid + yMid * yMid);

              const ir = Math.floor(rMid / dr);
              const iz = Math.floor(zMid / dz);

              if (ir >= 0 && ir < nr && iz >= 0 && iz < nz) {
                fluence[iz * nr + ir] += weight * s;
              }

              weight -= weight * mua / mut;

              x = xNew;
              y = yNew;
              z = zNew;

              const spin = spinHenyeyGreenstein(ux, uy, uz, gg, rand);
              ux = spin[0];
              uy = spin[1];
              uz = spin[2];

              if (weight < wThreshold) {
                if (rand() <= rouletteChance) {
                  weight /= rouletteChance;
                } else {
                  break;
                }
              }
            }

            if (p % 2000 === 0) {
              postMessage({
                type: "progress",
                done: p,
                total: nPhotons
              });
            }
          }

          return fluence;
        }

        function normalizeFluenceDensity(fluence, nPhotons, nr, nz, dr, dz) {
          const density = new Float64Array(nz * nr);
          let maxVal = 0;

          for (let iz = 0; iz < nz; iz++) {
            for (let ir = 0; ir < nr; ir++) {
              const rCenter = (ir + 0.5) * dr;
              const shellArea = ir === 0 ? Math.PI * dr * dr : 2.0 * Math.PI * rCenter * dr;
              const voxelVolume = shellArea * dz;
              const idx = iz * nr + ir;

              density[idx] = fluence[idx] / (nPhotons * voxelVolume + 1e-30);

              if (density[idx] > maxVal) {
                maxVal = density[idx];
              }
            }
          }

          for (let k = 0; k < density.length; k++) {
            density[k] /= maxVal + 1e-30;
          }

          return density;
        }

        function smoothRZ(F, nr, nz) {
          const out = new Float64Array(F.length);

          for (let iz = 0; iz < nz; iz++) {
            for (let ir = 0; ir < nr; ir++) {
              let sum = 0;
              let count = 0;

              for (let dz0 = -1; dz0 <= 1; dz0++) {
                for (let dr0 = -1; dr0 <= 1; dr0++) {
                  const zz = iz + dz0;
                  const rr = ir + dr0;

                  if (zz >= 0 && zz < nz && rr >= 0 && rr < nr) {
                    sum += F[zz * nr + rr];
                    count++;
                  }
                }
              }

              out[iz * nr + ir] = sum / count;
            }
          }

          return out;
        }

        function interpolateRZ(F, nr, dr, iz, rQuery) {
          if (rQuery <= 0) {
            return F[iz * nr];
          }

          const fIndex = rQuery / dr - 0.5;

          if (fIndex <= 0) {
            return F[iz * nr];
          }

          const i0 = Math.floor(fIndex);
          const i1 = i0 + 1;

          if (i0 < 0) {
            return F[iz * nr];
          }

          if (i1 >= nr) {
            return 0.0;
          }

          const t = fIndex - i0;
          const v0 = F[iz * nr + i0];
          const v1 = F[iz * nr + i1];

          return v0 * (1.0 - t) + v1 * t;
        }

        function makeSensitivityMap(params) {
          const {
            F,
            nr,
            nzRZ,
            dr,
            dz,
            nx,
            nz,
            range,
            sourceX,
            detectorX,
            suppressRadius
          } = params;

          const W = new Float64Array(nx * nz);
          let maxVal = 0;

          for (let j = 0; j < nz; j++) {
            const z = range.zMin + (j / (nz - 1)) * (range.zMax - range.zMin);

            for (let i = 0; i < nx; i++) {
              const x = range.xMin + (i / (nx - 1)) * (range.xMax - range.xMin);
              const idx = j * nx + i;

              if (z < 0) {
                W[idx] = 0;
                continue;
              }

              const izFloat = z / dz - 0.5;
              const iz0 = Math.floor(izFloat);
              const iz1 = iz0 + 1;

              if (iz0 < 0 || iz1 >= nzRZ) {
                W[idx] = 0;
                continue;
              }

              const tz = izFloat - iz0;
              const rS = Math.abs(x - sourceX);
              const rD = Math.abs(x - detectorX);

              const phiS0 = interpolateRZ(F, nr, dr, iz0, rS);
              const phiS1 = interpolateRZ(F, nr, dr, iz1, rS);
              const phiD0 = interpolateRZ(F, nr, dr, iz0, rD);
              const phiD1 = interpolateRZ(F, nr, dr, iz1, rD);

              const phiS = phiS0 * (1.0 - tz) + phiS1 * tz;
              const phiD = phiD0 * (1.0 - tz) + phiD1 * tz;

              const RS = Math.sqrt((x - sourceX) * (x - sourceX) + z * z);
              const RD = Math.sqrt((x - detectorX) * (x - detectorX) + z * z);
              const gateS = 1.0 - Math.exp(-Math.pow(RS / suppressRadius, 2.0));
              const gateD = 1.0 - Math.exp(-Math.pow(RD / suppressRadius, 2.0));

              const w = phiS * phiD * gateS * gateD;

              W[idx] = w;

              if (w > maxVal) {
                maxVal = w;
              }
            }
          }

          for (let k = 0; k < W.length; k++) {
            W[k] /= maxVal + 1e-30;
          }

          return W;
        }

        self.onmessage = function(event) {
          const model = event.data.model;
          const sds = event.data.sds;
          const photons = event.data.photons;
          const range = event.data.range;
          const nx = event.data.nx;
          const nz = event.data.nz;

          const zTop = model.layers.map(layer => layer.top);
          const zBot = model.layers.map(layer => layer.bottom);
          const muA = model.layers.map(layer => layer.mua);
          const muSp = model.layers.map(layer => layer.musp);
          const g = model.layers.map(layer => layer.g);
          const muS = muSp.map((musp, i) => musp / (1.0 - g[i]));
          const muT = muS.map((mus, i) => mus + muA[i]);

          const nr = Math.floor(model.rMax / model.dr);
          const nzRZ = Math.floor(model.zMax / model.dz);

          const fluence = monteCarloRZFluence({
            nPhotons: photons,
            nr,
            nz: nzRZ,
            dr: model.dr,
            dz: model.dz,
            zMax: model.zMax,
            sourceRadius: model.sourceRadius,
            zTop,
            zBot,
            muA,
            muT,
            g,
            wThreshold: 1e-4,
            rouletteChance: 0.1,
            maxSteps: 20000,
            seed: 7
          });

          let F = normalizeFluenceDensity(fluence, photons, nr, nzRZ, model.dr, model.dz);
          F = smoothRZ(F, nr, nzRZ);

          const W = makeSensitivityMap({
            F,
            nr,
            nzRZ,
            dr: model.dr,
            dz: model.dz,
            nx,
            nz,
            range,
            sourceX: -sds / 2.0,
            detectorX: sds / 2.0,
            suppressRadius: 1.2
          });

          postMessage({
            type: "done",
            values: W,
            maxVal: 1.0,
            nx,
            nz
          }, [W.buffer]);
        };
      `;

      const blob = new Blob([workerCode], {
        type: "application/javascript"
      });

      return new Worker(URL.createObjectURL(blob));
    }

    function runSimulation() {
      updateModelInfo();
      updateLayerPanel();
      updateOpticalPanel();

      const model = models[modelSelect.value];
      const modelForWorker = prepareModelForWorker(model);

      const sds = Math.max(2, Math.min(60, Number(sdsInput.value) || 20));
      const photons = Math.max(1000, Math.min(1000000, Number(photonInput.value) || 300000));

      sdsInput.value = sds;
      photonInput.value = photons;

      const range = getPlotRange(model, sds);
      const nx = 701;
      const nz = Math.round((range.zMax - range.zMin) / 0.25) + 1;

      if (currentWorker) {
        currentWorker.terminate();
        currentWorker = null;
      }

      setBusy(true, "Running Monte Carlo...");

      currentWorker = createMonteCarloWorker();

      currentWorker.onmessage = function(event) {
        const data = event.data;

        if (data.type === "progress") {
          const pct = Math.round((data.done / data.total) * 100);
          statusText.textContent = `Running Monte Carlo... ${pct}%`;
          return;
        }

        if (data.type === "done") {
          const values = new Float64Array(data.values);

          renderCanvas(
            model,
            sds,
            photons,
            values,
            data.maxVal,
            data.nx,
            data.nz,
            range
          );

          setBusy(false, "Simulation updated.");

          currentWorker.terminate();
          currentWorker = null;
        }
      };

      currentWorker.onerror = function(error) {
        console.error(error);
        setBusy(false, "Simulation failed. Photon number를 낮춰서 다시 실행해보세요.");

        if (currentWorker) {
          currentWorker.terminate();
          currentWorker = null;
        }
      };

      currentWorker.postMessage({
        model: modelForWorker,
        sds,
        photons,
        range,
        nx,
        nz
      });
    }

    modelSelect.addEventListener("change", function() {
      updateModelInfo();
      updateLayerPanel();
      updateOpticalPanel();
    });

    sdsInput.addEventListener("change", function() {
      statusText.textContent = "Parameter changed. Run Simulation을 눌러 결과를 갱신하세요.";
    });

    photonInput.addEventListener("change", function() {
      statusText.textContent = "Parameter changed. Run Simulation을 눌러 결과를 갱신하세요.";
    });

    runButton.addEventListener("click", runSimulation);

    window.addEventListener("load", function() {
      updateModelInfo();
      updateLayerPanel();
      updateOpticalPanel();
      statusText.textContent = "Set parameters and click Run Simulation.";
    });
  </script>
</body>
</html>
