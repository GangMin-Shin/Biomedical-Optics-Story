<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Mach-Zehnder Interferometer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      font-family: cursive;
      color: white;
      overflow-x: hidden;
      background-color: #000000;
    }

    body {
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("images/OCT%20background.jpg") center / cover no-repeat;
      opacity: 0.7;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        rgba(0, 0, 0, 0.35),
        rgba(0, 0, 0, 0.78)
      );
      z-index: 0;
      pointer-events: none;
    }

    .page-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 45px;
    }

    .content-card {
      max-width: 1100px;
      padding: 34px 38px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow:
        0 0 18px rgba(255, 255, 255, 0.18),
        0 0 40px rgba(102, 204, 255, 0.22);
      backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 44px;
      color: rgba(255, 255, 255, 0.98);
      text-shadow:
        0 0 8px rgba(102, 204, 255, 0.55),
        0 0 18px rgba(102, 204, 255, 0.35);
    }

    p {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.93);
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
    }

    .diagram-box {
      margin-top: 26px;
      padding: 20px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(158, 234, 255, 0.42);
      box-shadow:
        0 0 12px rgba(158, 234, 255, 0.22),
        inset 0 0 18px rgba(255, 255, 255, 0.06);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .label {
      fill: white;
      font-size: 18px;
      font-family: cursive;
      text-shadow: 0 0 6px black;
    }

    .small-label {
      fill: white;
      font-size: 15px;
      font-family: cursive;
    }

    .optical-line {
      stroke: #9eeaff;
      stroke-width: 5;
      fill: none;
      filter: drop-shadow(0 0 6px rgba(158, 234, 255, 0.9));
    }

    .component {
      stroke: white;
      stroke-width: 3;
      fill: rgba(255, 255, 255, 0.10);
    }

    .beam-splitter {
      stroke: #9eeaff;
      stroke-width: 5;
      fill: none;
    }

    .mirror {
      stroke: white;
      stroke-width: 6;
      stroke-linecap: round;
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.65));
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      text-decoration: none;
      font-size: 18px;
      color: white;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.10);
      transition:
        background 0.25s ease,
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateX(-4px);
      box-shadow:
        0 0 10px rgba(255, 255, 255, 0.40),
        0 0 22px rgba(102, 204, 255, 0.40);
    }

    @media screen and (max-width: 850px) {
      .page-container {
        padding: 24px;
      }

      .content-card {
        padding: 26px 24px;
      }

      h1 {
        font-size: 34px;
      }

      p {
        font-size: 16px;
      }

      .label {
        font-size: 15px;
      }

      .small-label {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="page-container">
    <div class="content-card">
      <h1>Mach-Zehnder Interferometer</h1>

      <p>
        The Mach-Zehnder interferometer separates the incident beam into two spatially distinct arms and recombines them
        at a second beam splitter to generate interference.
      </p>

      <div class="diagram-box">
        <svg viewBox="0 0 1000 560" role="img" aria-label="Mach-Zehnder interferometer schematic">
          <defs>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L9,3 z" fill="#9eeaff"></path>
            </marker>
          </defs>

          <line class="optical-line" x1="80" y1="280" x2="245" y2="280" marker-end="url(#arrow)"></line>
          <text class="label" x="65" y="255">Laser</text>

          <line class="beam-splitter" x1="255" y1="225" x2="315" y2="335"></line>
          <text class="small-label" x="240" y="365">BS1</text>

          <line class="optical-line" x1="300" y1="280" x2="300" y2="120" marker-end="url(#arrow)"></line>
          <line class="optical-line" x1="300" y1="120" x2="760" y2="120" marker-end="url(#arrow)"></line>

          <line class="optical-line" x1="300" y1="280" x2="760" y2="280" marker-end="url(#arrow)"></line>

          <line class="mirror" x1="745" y1="95" x2="790" y2="140"></line>
          <text class="small-label" x="790" y="118">M1</text>

          <line class="mirror" x1="745" y1="255" x2="790" y2="300"></line>
          <text class="small-label" x="790" y="278">M2</text>

          <line class="optical-line" x1="780" y1="120" x2="780" y2="250" marker-end="url(#arrow)"></line>
          <line class="optical-line" x1="780" y1="280" x2="780" y2="330" marker-end="url(#arrow)"></line>

          <line class="beam-splitter" x1="750" y1="335" x2="810" y2="225"></line>
          <text class="small-label" x="810" y="365">BS2</text>

          <line class="optical-line" x1="780" y1="280" x2="920" y2="280" marker-end="url(#arrow)"></line>
          <rect class="component" x="920" y="235" width="55" height="90" rx="10"></rect>
          <text class="label" x="875" y="360">Detector</text>

          <text class="label" x="435" y="90">Arm 1</text>
          <text class="label" x="435" y="255">Arm 2</text>
        </svg>
      </div>

      <a class="back-link" href="oct.html">← Back to OCT Page</a>
    </div>
  </div>
</body>
</html>
