<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Diffuse Speckle Contrast Analysis Schematic</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: white;
      overflow-x: hidden;
      background-color: #000;
    }

    body {
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("images/Diffuse%20Speckle%20Contrast%20Analysis%20background.jpeg") center / cover no-repeat;
      opacity: 0.7;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(70, 180, 255, 0.18), transparent 32%),
        linear-gradient(rgba(0, 0, 0, 0.36), rgba(0, 0, 0, 0.78));
      z-index: 0;
      pointer-events: none;
    }

    .page-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 34px;
    }

    .nav-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .nav-button {
      display: inline-block;
      padding: 9px 14px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.55);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.2;
      transition:
        background 0.25s ease,
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateX(-3px);
      box-shadow: 0 0 18px rgba(102, 204, 255, 0.35);
    }

    .page-shell {
      width: min(1450px, 96vw);
      margin: 0;
    }

    .main-card {
      width: 100%;
      padding: 28px;
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow:
        0 0 18px rgba(255, 255, 255, 0.12),
        0 0 36px rgba(110, 210, 255, 0.18);
      backdrop-filter: blur(5px);
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(30px, 3vw, 38px);
      color: rgba(255, 255, 255, 0.98);
      line-height: 1.18;
      font-weight: 700;
      text-align: left;
      text-shadow:
        0 0 8px rgba(102, 204, 255, 0.55),
        0 0 18px rgba(102, 204, 255, 0.35);
    }

    .subtitle {
      margin: 0 0 20px;
      font-size: 18px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.86);
      max-width: 980px;
    }

    .schematic-frame {
      width: 100%;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        inset 0 0 24px rgba(40, 80, 100, 0.08),
        0 0 16px rgba(102, 204, 255, 0.12);
    }

    .schematic-image {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto;
      border-radius: 14px;
    }

    @media screen and (max-width: 900px) {
      .page-container {
        padding: 22px;
      }

      .nav-buttons {
        gap: 10px;
        margin-bottom: 18px;
      }

      .nav-button {
        padding: 9px 14px;
        font-size: 14px;
      }

      .page-shell {
        width: 100%;
      }

      .main-card {
        padding: 20px;
      }

      h1 {
        font-size: 30px;
      }

      .schematic-frame {
        padding: 14px;
        border-radius: 16px;
      }

      .schematic-image {
        border-radius: 12px;
      }
    }

    @media screen and (max-width: 520px) {
      .page-container {
        padding: 16px;
      }

      h1 {
        font-size: 26px;
      }

      .subtitle {
        font-size: 16px;
      }

      .main-card {
        padding: 16px;
        border-radius: 18px;
      }

      .schematic-frame {
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="page-container">
    <nav class="nav-buttons">
      <a class="nav-button" href="dot.html">← Back to DOT</a>
      <a class="nav-button" href="index.html">Homepage</a>
    </nav>

    <main class="page-shell">
      <section class="main-card">
        <h1>Diffuse Speckle Contrast Analysis Schematic</h1>

        <p class="subtitle">
          Optical schematic of the diffuse speckle contrast analysis system.
        </p>

        <div class="schematic-frame">
          <img
            class="schematic-image"
            src="images/DSCA.png"
            alt="Diffuse Speckle Contrast Analysis Schematic"
          >
        </div>
      </section>
    </main>
  </div>
</body>
</html>
