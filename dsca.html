<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Diffuse Speckle Contrast Analysis Schematic</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      font-family: "Courier New", monospace;
      color: #173247;
      overflow-x: hidden;
      background-color: #000;
    }

    body {
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("images/Diffuse%20Speckle%20Contrast%20Analysis%20background.jpeg") center / cover no-repeat;
      opacity: 0.7;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        rgba(0, 0, 0, 0.28),
        rgba(0, 0, 0, 0.72)
      );
      z-index: 0;
      pointer-events: none;
    }

    .page-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 24px;
    }

    .nav-buttons {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .nav-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      background: rgba(0, 0, 0, 0.42);
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      transition:
        background 0.25s ease,
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.14);
      transform: translateY(-2px);
      box-shadow:
        0 0 10px rgba(255, 255, 255, 0.35),
        0 0 22px rgba(102, 204, 255, 0.35);
    }

    .page-shell {
      width: min(1500px, 96vw);
      margin: 0;
    }

    .main-card {
      width: 100%;
      padding: 32px;
      border: 1px solid rgba(150, 180, 190, 0.42);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 28px;
      color: #000000;
      font-size: clamp(24px, 2.4vw, 42px);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: 0.5px;
      text-align: center;
      white-space: nowrap;
    }

    .schematic-frame {
      width: 100%;
      padding: 20px;
      border: 1px solid rgba(140, 170, 180, 0.38);
      border-radius: 22px;
      background: rgba(250, 253, 254, 0.94);
      box-shadow: inset 0 0 24px rgba(40, 80, 100, 0.08);
    }

    .schematic-image {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto;
      border-radius: 16px;
    }

    @media screen and (max-width: 900px) {
      .page-container {
        padding: 14px;
      }

      .nav-buttons {
        gap: 10px;
        margin-bottom: 18px;
      }

      .nav-button {
        padding: 10px 15px;
        font-size: 16px;
      }

      .page-shell {
        width: 100%;
      }

      .main-card {
        padding: 20px;
        border-radius: 22px;
      }

      h1 {
        font-size: clamp(18px, 4.2vw, 28px);
        letter-spacing: 0;
      }

      .schematic-frame {
        padding: 14px;
        border-radius: 18px;
      }

      .schematic-image {
        border-radius: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="page-container">
    <nav class="nav-buttons">
      <a class="nav-button" href="dot.html">← Back to DOT</a>
      <a class="nav-button" href="index.html">Homepage</a>
    </nav>

    <main class="page-shell">
      <section class="main-card">
        <h1>Diffuse Speckle Contrast Analysis Schematic</h1>

        <div class="schematic-frame">
          <img
            class="schematic-image"
            src="images/DSCA.png"
            alt="Diffuse Speckle Contrast Analysis Schematic"
          >
        </div>
      </section>
    </main>
  </div>
</body>
</html>
