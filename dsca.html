<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diffuse Speckle Contrast Analysis</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      font-family: "Courier New", monospace;
      color: #173247;
      background:
        linear-gradient(rgba(242, 250, 252, 0.84), rgba(242, 250, 252, 0.84)),
        repeating-linear-gradient(
          0deg,
          rgba(20, 80, 100, 0.045) 0,
          rgba(20, 80, 100, 0.045) 1px,
          transparent 1px,
          transparent 36px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(20, 80, 100, 0.045) 0,
          rgba(20, 80, 100, 0.045) 1px,
          transparent 1px,
          transparent 36px
        );
      overflow-x: hidden;
    }

    body {
      padding: 24px;
    }

    .page-shell {
      width: min(1840px, 99vw);
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      padding: 15px 22px;
      border: 1px solid rgba(20, 130, 160, 0.42);
      border-radius: 999px;
      color: #0b6f8a;
      background: rgba(255, 255, 255, 0.86);
      text-decoration: none;
      font-weight: 700;
      font-size: 21px;
      line-height: 1;
      box-shadow: 0 8px 22px rgba(30, 60, 70, 0.08);
    }

    .back-link:hover {
      background: rgba(230, 249, 254, 0.95);
    }

    .main-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(150, 180, 190, 0.35);
      border-radius: 28px;
      box-shadow: 0 20px 45px rgba(30, 60, 70, 0.12);
      backdrop-filter: blur(10px);
      padding: 32px 36px 40px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 22px;
      font-size: clamp(34px, 3.2vw, 58px);
      letter-spacing: 1px;
      color: #173247;
      font-weight: 700;
    }

    h2 {
      margin: 0 0 22px;
      font-size: clamp(24px, 2.2vw, 42px);
      color: #173247;
      font-weight: 700;
    }

    .schematic-frame {
      width: 100%;
      border: 1px solid rgba(140, 170, 180, 0.35);
      border-radius: 24px;
      background: rgba(250, 253, 254, 0.94);
      overflow: hidden;
    }

    .schematic-svg {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1672 / 941;
      background: #f8fbfc;
    }

    text {
      font-family: "Courier New", monospace;
      fill: #111;
      font-weight: 700;
    }

    .main-title-color {
      color: #173247;
    }

    @media (max-width: 900px) {
      body {
        padding: 14px;
      }

      .main-card {
        padding: 22px;
        border-radius: 22px;
      }

      .back-link {
        font-size: 18px;
        padding: 12px 18px;
      }
    }
  </style>
</head>

<body>
  <main class="page-shell">
    <a class="back-link" href="index.html">← Back to main page</a>

    <section class="main-card">
      <h1>MMF–DSCA Optical Design</h1>
      <h2>Diffuse Speckle Contrast Analysis Schematic</h2>

      <div class="schematic-frame">
        <svg
          class="schematic-svg"
          viewBox="0 0 1672 941"
          role="img"
          aria-label="MMF-DSCA optical design schematic"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <linearGradient id="bundleGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#9bc8ec"/>
              <stop offset="100%" stop-color="#6ba5d4"/>
            </linearGradient>

            <linearGradient id="orangeProbeGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#cc5b00"/>
              <stop offset="50%" stop-color="#ff8b24"/>
              <stop offset="100%" stop-color="#c55400"/>
            </linearGradient>

            <linearGradient id="blueProbeGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#06467d"/>
              <stop offset="50%" stop-color="#1b76bd"/>
              <stop offset="100%" stop-color="#073f70"/>
            </linearGradient>

            <linearGradient id="blackTipGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#111"/>
              <stop offset="50%" stop-color="#5b5b5b"/>
              <stop offset="100%" stop-color="#111"/>
            </linearGradient>

            <linearGradient id="lensGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#8ccfff"/>
              <stop offset="50%" stop-color="#d9f2ff"/>
              <stop offset="100%" stop-color="#69b8ee"/>
            </linearGradient>

            <radialGradient id="sensitivityGrad" cx="50%" cy="42%" r="72%">
              <stop offset="0%" stop-color="rgba(255,230,72,0.82)"/>
              <stop offset="55%" stop-color="rgba(255,215,50,0.54)"/>
              <stop offset="100%" stop-color="rgba(255,210,40,0.08)"/>
            </radialGradient>

            <radialGradient id="speckleSpotGrad" cx="50%" cy="50%" r="60%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
              <stop offset="48%" stop-color="rgba(220,220,220,0.70)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
            </radialGradient>

            <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="3"/>
            </filter>

            <filter id="spotGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.2" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>

            <pattern id="fatPattern" x="0" y="0" width="16" height="12" patternUnits="userSpaceOnUse">
              <circle cx="4" cy="4" r="3" fill="rgba(255,220,120,0.45)"/>
              <circle cx="12" cy="8" r="3.5" fill="rgba(255,230,140,0.42)"/>
            </pattern>
          </defs>

          <!-- Background -->
          <rect x="0" y="0" width="1672" height="941" fill="#f8fbfc"/>

          <!-- Laser source -->
          <g id="laser-source">

            <g stroke="#111" stroke-width="2.4" stroke-linecap="round">

              <line x1="106" y1="155" x2="106" y2="187"/>

              <line x1="106" y1="155" x2="129" y2="132"/>
              <line x1="106" y1="155" x2="83" y2="178"/>

            <text x="151" y="147" font-size="22">808 nm</text>
            <text x="151" y="174" font-size="22">CW laser</text>
          </g>

          <!-- Orange fiber network -->
          <g id="orange-network" fill="none" stroke="#ef7b16" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M263 155 L352 155"/>
            <path d="M407 155 C485 155 494 98 609 98"/>
            <path d="M407 155 C486 155 505 325 609 325"/>
            <path d="M671 117 L905 117"/>
            <path d="M671 153 L905 153"/>
            <path d="M671 348 L905 348"/>
            <path d="M671 369 C745 369 754 405 754 496"/>

          <!-- Beam splitters -->
          <g id="beam-splitters">
            <g>

              <line x1="359" y1="176" x2="400" y2="135" stroke="#173247" stroke-width="2.5"/>
              <text x="383" y="238" text-anchor="middle" font-size="22">50:50 Fiber BS</text>
            </g>

            <g>
              <rect x="609" y="70" width="62" height="62" fill="#f7fbff" stroke="#173247" stroke-width="2.5"/>

            </g>

            <g>
              <rect x="609" y="294" width="62" height="62" fill="#f7fbff" stroke="#173247" stroke-width="2.5"/>
              <line x1="617" y1="348" x2="663" y2="302" stroke="#173247" stroke-width="2.5"/>
              <text x="675" y="409" text-anchor="middle" font-size="22">50:50 Fiber BS</text>
            </g>
          </g>

          <!-- Fan-Out bundle and detector fibers -->
          <g id="fanout-bundle">
            <text x="1190" y="63" text-anchor="middle" font-size="30">Fan-Out</text>
            <text x="1190" y="93" text-anchor="middle" font-size="30">Bundle</text>

            <g fill="none" stroke="#0b61a4" stroke-width="4" stroke-linecap="round">

            <path d="M1250 177 L1292 177" stroke="#222" stroke-width="2.5" fill="none"/>

          <!-- Lens system -->
          <g id="lens-system">
            <rect x="1292" y="135" width="240" height="84" fill="#eeeeee" stroke="#222" stroke-width="2.5"/>

          <g id="ccd-camera">
            <text x="1650" y="73" text-anchor="middle" font-size="28">CCD</text>

            <rect x="1583" y="115" width="118" height="24" fill="#d2d2d2" stroke="#222" stroke-width="2.5"/>
          </g>

          <!-- Speckle inset -->
          <g id="speckle-inset">
            <rect x="1410" y="338" width="220" height="220" fill="#050505" stroke="#111" stroke-width="2.5"/>

            <g filter="url(#spotGlow)">
              <circle cx="1520" cy="385" r="30" fill="url(#speckleSpotGrad)"/>

              <circle cx="1570" cy="514" r="33" fill="url(#speckleSpotGrad)"/>
              <circle cx="1520" cy="550" r="32" fill="url(#speckleSpotGrad)"/>

            <g fill="rgba(255,255,255,0.70)">

          <!-- Source and detector probes -->
          <g id="probes">
            <rect x="744" y="365" width="20" height="138" rx="7" fill="url(#orangeProbeGrad)" stroke="#d76a00" stroke-width="2"/>

      </div>
    </section>
  </main>
</body>
</html>
