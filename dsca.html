<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Diffuse Speckle Contrast Analysis Schematic</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      font-family: "Courier New", monospace;
      color: #173247;
      overflow-x: hidden;
      background-color: #000;
    }

    body {
      position: relative;
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("images/Diffuse Speckle Contrast Analysis background.jpeg") center / cover no-repeat;
      opacity: 0.7;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.18);
      z-index: -1;
    }

    .page-shell {
      width: min(1500px, 96vw);
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      padding: 14px 22px;
      border: 1px solid rgba(20, 130, 160, 0.45);
      border-radius: 999px;
      color: #0b6f8a;
      background: rgba(255, 255, 255, 0.86);
      text-decoration: none;
      font-weight: 700;
      font-size: 20px;
      line-height: 1;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
    }

    .back-link:hover {
      background: rgba(230, 249, 254, 0.96);
    }

    .main-card {
      width: 100%;
      padding: 34px;
      border: 1px solid rgba(150, 180, 190, 0.42);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 28px;
      font-size: clamp(32px, 3.2vw, 58px);
      line-height: 1.15;
      letter-spacing: 1px;
      color: #173247;
      font-weight: 700;
      text-align: center;
    }

    .schematic-frame {
      width: 100%;
      padding: 22px;
      border: 1px solid rgba(140, 170, 180, 0.38);
      border-radius: 24px;
      background: rgba(250, 253, 254, 0.94);
      box-shadow: inset 0 0 24px rgba(40, 80, 100, 0.08);
    }

    .schematic-image {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      border-radius: 18px;
    }

    @media (max-width: 900px) {
      body {
        padding: 14px;
      }

      .main-card {
        padding: 22px;
        border-radius: 22px;
      }

      .back-link {
        font-size: 18px;
        padding: 12px 18px;
      }

      .schematic-frame {
        padding: 14px;
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="page-shell">
    <a class="back-link" href="index.html">← Back to main page</a>

    <section class="main-card">
      <h1>Diffuse Speckle Contrast Analysis Schematic</h1>

      <div class="schematic-frame">
        <img
          class="schematic-image"
          src="images/DSCA.png"
          alt="Diffuse Speckle Contrast Analysis Schematic"
        >
      </div>
    </section>
  </main>
</body>
</html>
